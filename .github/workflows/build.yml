name: Build APK
on:
  push:
    branches: [ master, main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Setup project
        run: |
          flutter create --org com.demontv --project-name demon_tv_plus tmp_app
          cp -r tmp_app/android .
          rm -rf tmp_app
          # Permiso internet
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"\/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"\/>\n    <uses-feature android:name="android.software.leanback" android:required="false"\/>\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false"\/>/' android/app/src/main/AndroidManifest.xml
          # Kotlin version
          find . -name 'settings.gradle' | xargs grep -l 'kotlin' 2>/dev/null | xargs sed -i 's/version "[0-9.]*"/version "1.9.22"/g' || true
          find . -name 'build.gradle' | xargs grep -l 'kotlin_version' 2>/dev/null | xargs sed -i 's/kotlin_version = "[0-9.]*"/kotlin_version = "1.9.22"/g' || true
          # minSdk
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle || true
          sed -i 's/minSdkVersion 16/minSdkVersion 21/' android/app/build.gradle || true
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "2.0.0"/' android/build.gradle || true
          sed -i "s/id 'org.jetbrains.kotlin.android' version .*/id 'org.jetbrains.kotlin.android' version '2.0.0' apply false/" android/settings.gradle || true
          sed -i 's/org.jetbrains.kotlin.android:1\.8\.[0-9]*/org.jetbrains.kotlin.android:2.0.0/g' android/settings.gradle || true
          # TV launcher
          sed -i 's/<action android:name="android.intent.action.MAIN"\/>/<action android:name="android.intent.action.MAIN"\/>\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER"\/>/' android/app/src/main/AndroidManifest.xml
      - run: flutter pub get
      - name: Fix wakelock
        run: find /home/runner/.pub-cache -name "build.gradle" | xargs grep -l "1.3.50" 2>/dev/null | xargs sed -i 's/1\.3\.50/1.6.10/g' 2>/dev/null || true
      - run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: demontv-plus-apk
          path: build/app/outputs/flutter-apk/app-release.apk
